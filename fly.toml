# fly.toml app configuration file generated for mubu on 2026-02-19T16:04:51Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'mubu'
primary_region = 'nrt'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
